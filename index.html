<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>

    <h1 style="text-align: center; font-weight: bolder; font-size: 60px;">Calculator</h1>
    
    <form class="Calculator">
      <div class="form-group">
        <input type="text">
      </div>
      
      <div class="form-group">
        <button type="button">%</button><button type="button">C</button><button type="button">DEL</button><button type="button">/</button>
      </div>
      
      <div class="form-group">
        <button type="button">1</button><button type="button">2</button><button type="button">3</button><button type="button">+</button>
      </div>
      
      <div class="form-group">
        <button type="button">4</button><button type="button">5</button><button type="button">6</button><button type="button">-</button>
      </div>
      
      <div class="form-group">
        <button type="button">7</button><button type="button">8</button><button type="button">9</button><button type="button">*</button>
      </div>
      
      <div class="form-group">
        <button type="button">00</button><button type="button">0</button><button type="button">.</button>
        <button type="button" class="evaluate">=</button>
      </div>
    
    </form>

    <script src="CalCulator.js"></script>
  
  </body>
</html>
